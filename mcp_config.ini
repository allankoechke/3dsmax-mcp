[mcp]
safe_mode = true
# TCP fallback is opt-in via the MCP Start macroscript. Keep idle polling sparse
# to avoid viewport stutter when the native bridge is unavailable.
tcp_idle_poll_interval_ms = 1500
tcp_active_poll_interval_ms = 50
tcp_active_poll_ticks_after_request = 10
[llm]
# API key belongs in %LOCALAPPDATA%\3dsmax-mcp\.env (or a real env var), not here.
# Everything below is non-secret settings.
base_url = https://openrouter.ai/api/v1
model = anthropic/claude-sonnet-4.6
max_tokens = 4096
temperature = 0.7

# Token controls for the in-Max standalone chat.
# prompt_mode: compact (default), full, none
# tool_profile: full (default), core — full keeps all native-routable tools
# include_scene_snapshot: false (default) — scene via get_session_context / get_scene_snapshot when needed
prompt_mode = compact
tool_profile = full
include_scene_snapshot = false
max_scene_roots = 25
max_prompt_chars = 12000
max_tool_result_chars = 12000
max_history_tool_chars = 1800
max_tool_summary_chars = 600
max_display_tool_chars = 600
max_tool_loops = 4
